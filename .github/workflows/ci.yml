name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download modules
        run: go mod download

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' and commit the result."
            exit 1
          fi

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -v ./...

      - name: Vet
        run: go vet ./...

      - name: Validate policies
        run: |
          for f in policies/*.yaml; do
            echo "Validating $f"
            ./aisentinel validate-policy "$f" || (go build -o aisentinel ./cmd/aisentinel && ./aisentinel validate-policy "$f")
          done

  release:
    name: Build binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Determine version
        id: ver
        run: |
          # On a tag push (refs/tags/v1.2.3) this yields "1.2.3"; on any other
          # trigger (e.g. branch push) it falls back to "dev" so binaries
          # built outside a release still self-report sanely.
          ref="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Build aisentinel
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/aisentinel-${GOOS}-${GOARCH}${{ matrix.ext }}" \
            ./cmd/aisentinel
      - name: Build aisentinel-sidecar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/aisentinel-sidecar-${GOOS}-${GOARCH}${{ matrix.ext }}" \
            ./cmd/aisentinel-sidecar
      - name: Checksums (linux/amd64)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          cd dist && sha256sum * > SHA256SUMS
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten binaries
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
      - name: Pack MCPB bundles
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Install mcpb CLI (Anthropic's MCP Bundle toolchain).
          # Note: anthropics/mcpb does NOT publish GitHub Release binaries;
          # the only distribution channel is npm.
          npm install -g @anthropic-ai/mcpb@2.1.2
          mcpb --version
          # Pack aisentinel.mcpb from linux/amd64 binary.
          cp dist/aisentinel-linux-amd64 bundles/aisentinel/server/aisentinel
          (cd bundles/aisentinel && mcpb pack . ../../dist/aisentinel-${VERSION}.mcpb)
          # Pack aisentinel-sidecar.mcpb from linux/amd64 binary.
          cp dist/aisentinel-sidecar-linux-amd64 bundles/aisentinel-sidecar/server/aisentinel-sidecar
          (cd bundles/aisentinel-sidecar && mcpb pack . ../../dist/aisentinel-sidecar-${VERSION}.mcpb)
          # Record SHA-256 of both bundles for traceability.
          (cd dist && sha256sum aisentinel-${VERSION}.mcpb aisentinel-sidecar-${VERSION}.mcpb) >> SHA256SUMS
          ls -la dist/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aisentinel-*
            dist/aisentinel-sidecar-*
            dist/*.mcpb
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: false