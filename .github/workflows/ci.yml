name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -v ./...

      - name: Vet
        run: go vet ./...

      - name: Validate policies
        run: |
          for f in policies/*.yaml; do
            echo "Validating $f"
            ./aisentinel validate-policy "$f" || (go build -o aisentinel ./cmd/aisentinel && ./aisentinel validate-policy "$f")
          done

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: |
          go build -o dist/aisentinel-linux-amd64 ./cmd/aisentinel
          go build -o dist/aisentinel-darwin-amd64 ./cmd/aisentinel
          go build -o dist/aisentinel-windows-amd64.exe ./cmd/aisentinel
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true