# Publishes AISentinel to the official MCP Registry (registry.modelcontextprotocol.io).
# Triggered on GitHub Release published.
#
# Uses GitHub OIDC for authentication (no PAT secret required) — per the official
# registry docs at https://github.com/modelcontextprotocol/registry/blob/main/docs/modelcontextprotocol-io/github-actions.mdx
#
# After publish, the server becomes discoverable to all MCP clients
# (Claude Desktop, Cursor, Cline, etc.) via the official registry.

name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:    # allow manual re-runs from the Actions tab

jobs:
  publish:
    name: Publish to registry.modelcontextprotocol.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC auth
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install mcp-publisher CLI
        run: |
          set -euo pipefail
          PLATFORM="$(uname -s | tr '[:upper:]' '[:lower:]')_amd64"
          VERSION="v1.7.9"
          URL="https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/mcp-publisher_${PLATFORM}.tar.gz"
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o /tmp/mcp-publisher.tar.gz "$URL"
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp
          install -m 0755 /tmp/mcp-publisher "$HOME/.local/bin/mcp-publisher"
          "$HOME/.local/bin/mcp-publisher" --version

      - name: Log in to MCP Registry via GitHub OIDC
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          # 'github-oidc' is the dedicated OIDC method for CI; 'github' is browser OAuth.
          # The runner exposes ACTIONS_ID_TOKEN_REQUEST_URL and ACTIONS_ID_TOKEN_REQUEST_TOKEN
          # automatically when permissions: id-token: write is granted above.
          mcp-publisher login github-oidc \
            --registry https://registry.modelcontextprotocol.io \
            io.github.Kabzhanov/aisentinel

      - name: Publish server to MCP Registry
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          mcp-publisher publish
        working-directory: ${{ github.workspace }}

      - name: Summary
        if: success()
        run: |
          echo "✅ Published AISentinel v${{ github.event.release.tag_name }} to MCP Registry"
          echo "Visible at: https://registry.modelcontextprotocol.io/"